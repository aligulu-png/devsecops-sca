name: DevSecOps Pipeline - SCA Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Asililiqlari yukle
        working-directory: ./app
        run: npm install

  sca-scan:
    name: 🔍 SCA Scan (OWASP)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Asililiqlari yukle
        working-directory: ./app
        run: npm install

      - name: OWASP Dependency-Check yukle
        run: |
          wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.3/dependency-check-10.0.3-release.zip
          unzip -q dependency-check-10.0.3-release.zip

      - name: sca-reports qovluğu yarat
        run: mkdir -p ./sca-reports

      - name: SCA Scan et
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --project "vulnerable-demo-app" \
            --scan ./app \
            --format HTML \
            --format JSON \
            --out ./sca-reports \
            --enableRetired \
            --nvdApiKey $NVD_API_KEY
        continue-on-error: true

      - name: Report saxla
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: sca-reports/

      - name: Neticeni goster
        if: always()
        run: |
          if [ -f "sca-reports/dependency-check-report.json" ]; then
            echo "✅ Report ugurla yaradildi"
            VULN=$(cat sca-reports/dependency-check-report.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          total=sum(len(x.get('vulnerabilities',[])) for x in d.get('dependencies',[]))
          print(total)
            ")
            echo "Tapilan zeiflik sayi: $VULN"
          else
            echo "⚠️ Report yaradilmadi"
          fi

  notify:
    name: 📢 Neticə
    runs-on: ubuntu-latest
    needs: [build, sca-scan]
    if: always()
    steps:
      - name: Pipeline neticesi
        run: |
          echo "=================================="
          echo "  DevSecOps Pipeline Neticesi"
          echo "=================================="
          echo "Build:    ${{ needs.build.result }}"
          echo "SCA Scan: ${{ needs.sca-scan.result }}"
          echo "=================================="
