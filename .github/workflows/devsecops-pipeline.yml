name: DevSecOps Pipeline - SCA Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Asililiqlari yukle
        working-directory: ./app
        run: npm install

      - name: Build artifakti saxla
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app/

  sca-scan:
    name: 🔍 SCA Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Asililiqlari yukle
        working-directory: ./app
        run: npm install

      - name: SCA Scan et
        working-directory: ./app
        run: |
          echo "========== SCA SCAN BASLADI =========="
          npm audit --json > sca-report.json || true
          echo "========== ZEIFLIKLER =========="
          npm audit || true
          echo "========== SCA SCAN BITDI =========="

      - name: SCA Report saxla
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: app/sca-report.json

  notify:
    name: 📢 Neticə
    runs-on: ubuntu-latest
    needs: [build, sca-scan]
    if: always()
    steps:
      - name: Pipeline neticesi
        run: |
          echo "=================================="
          echo "  DevSecOps Pipeline Neticesi"
          echo "=================================="
          echo "Build:    ${{ needs.build.result }}"
          echo "SCA Scan: ${{ needs.sca-scan.result }}"
          echo "=================================="
